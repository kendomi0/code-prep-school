name: Run tests

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6.4.0
              with:
                node-version: '22'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run Jest tests
              run: npm test